function safeStorageGet(key) {
  try { return localStorage.getItem(key); } catch (e) { return null; }
}
function safeStorageSet(key, value) {
  try { localStorage.setItem(key, value); } catch (e) { /* تجاهل بهدوء */ }
}

    document.documentElement.setAttribute('data-theme', 'dark');

function loadScriptTag(src) {
  return new Promise((resolve, reject) => {
    const el = document.createElement('script');
    el.src = src;
    el.onload = () => resolve();
    el.onerror = () => reject(new Error('failed to load ' + src));
    document.head.appendChild(el);
  });
}

let _libLoadPromise = null;
function loadSupabaseLib() {
  if (typeof supabase !== 'undefined') return Promise.resolve();
  if (_libLoadPromise) return _libLoadPromise;
  _libLoadPromise = SUPABASE_LIB_SOURCES.reduce(
    (chain, src) => chain.catch(() => loadScriptTag(src)),
    Promise.reject()
  );
  return _libLoadPromise;
}

  _chartLibPromise = sources.reduce(

}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

const STAGE_PROBABILITY = {
  discovery: 0.10, demo_scheduled: 0.25, demo_done: 0.40,
  proposal: 0.60, negotiation: 0.75, won: 1, lost: 0,
};

const CURRENCY_TO_USD = { EGP: 1 / 49, KWD: 3.25, OMR: 2.6 };

let _settingsLoaded = false;
async function loadAppSettings() {
  if (_settingsLoaded) return;
  try {
    await ensureSb();
    const { data, error } = await sb.from('app_settings').select('*');
    if (error || !data) return;
    data.forEach(row => {
      if (row.key === 'currency_rates' && row.value) Object.assign(CURRENCY_TO_USD, row.value);
      if (row.key === 'stage_probabilities' && row.value) Object.assign(STAGE_PROBABILITY, row.value);
    });
    _settingsLoaded = true;
  } catch (e) {
    console.error('تعذر تحميل الإعدادات، هيتم استخدام القيم الافتراضية:', e);
  }
}

function weightedValue(client) {
  const val = Number(client.deal_value) || 0;
  const prob = STAGE_PROBABILITY[client.stage] ?? 0;
  return val * prob;
}

function toUSD(amount, currency) {
  const rate = CURRENCY_TO_USD[currency] || 1;
  return (Number(amount) || 0) * rate;
}

function formatMoney(amount, currency) {
  const n = Number(amount) || 0;
  return Math.round(n).toLocaleString('ar-EG') + (currency ? (' ' + currency) : '');
}

function monthKey(dateStr) {
  if (!dateStr) return null;
  return dateStr.slice(0, 7); // "2026-07-15" → "2026-07"
}

// ---------- تجربة الاستخدام: تنبيهات Toast بدل alert() ----------
function showToast(message, type = 'info') {
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('toast-show'));
  setTimeout(() => {
    toast.classList.remove('toast-show');
    setTimeout(() => toast.remove(), 250);
  }, 3200);
}

  const original = button.textContent;
  button.disabled = true;
  button.innerHTML = label + '<span class="spinner"></span>';
  try {
    await fn();
  } finally {
    button.disabled = false;
    button.textContent = original;
  }
}

const COUNTRY_DIAL_CODES = { 'مصر': '20', 'الكويت': '965', 'عُمان': '968' };

function whatsappLink(phone, country) {
  if (!phone) return null;
  const raw = phone.trim();
  let digits = raw.replace(/[^\d]/g, '');
  if (!digits) return null;

  // الرقم مكتوب بمفتاح دولة صريح (+20، +965...) — يكفي نشيل الرموز بس
  if (raw.startsWith('+')) {
    return 'https://wa.me/' + digits;
  }

  // الرقم محلي (بيبدأ بصفر) — نضيف مفتاح الدولة بناءً على دولة العميل
  if (raw.startsWith('0')) {
    const code = COUNTRY_DIAL_CODES[country];
    if (code) {
      digits = code + digits.replace(/^0+/, '');
      return 'https://wa.me/' + digits;
    }
  }

  // مش عارفين الدولة، نستخدم الأرقام زي ما هي (أفضل من مفيش رابط خالص)
  return 'https://wa.me/' + digits;
}

// ---------- مرفقات العميل (Supabase Storage) ----------
async function uploadClientFile(clientId, file) {
  const path = clientId + '/' + Date.now() + '_' + file.name.replace(/[^\w.\-]/g, '_');
  const { error } = await sb.storage.from('client-files').upload(path, file);
  if (error) throw error;
  return path;
}

async function listClientFiles(clientId) {
  const { data, error } = await sb.storage.from('client-files').list(clientId, { sortBy: { column: 'created_at', order: 'desc' } });
  if (error) return [];
  return data || [];
}

async function getClientFileUrl(clientId, filename) {
  const { data, error } = await sb.storage.from('client-files').createSignedUrl(clientId + '/' + filename, 3600);
  if (error) return null;
  return data.signedUrl;
}

async function deleteClientFile(clientId, filename) {
  await sb.storage.from('client-files').remove([clientId + '/' + filename]);
}

function reviewBadgeClass(status) {

  if (status === 'يحتاج استكمال') return 'badge-needs';

}

// ---------- Auth helpers ----------
async function getCurrentProfile() {
  try {
    await ensureSb();
  } catch (e) {
    return null;
  }
  try {
    const { data: sessionData } = await sb.auth.getSession();
    if (!sessionData || !sessionData.session) return null;
    const userId = sessionData.session.user.id;
    const { data, error } = await sb.from('profiles').select('*').eq('id', userId).single();
    if (error) return null;
    return data;
  } catch (e) {
    console.error('getCurrentProfile failed:', e);
    return null;
  }
}

async function requireRole(allowedRoles) {
  const profile = await getCurrentProfile();
  if (!profile) {
    window.location.href = 'login.html';
    return null;
  }
  if (!allowedRoles.includes(profile.role)) {
    window.location.href = 'login.html';
    return null;
  }
  return profile;
}

async function logout() {
  try { await ensureSb(); if (sb) await sb.auth.signOut(); } catch (e) {}
  window.location.href = 'login.html';
}

  const e = escapeHtml;
  let lines = [];
  lines.push('العميل: ' + e(d.name || '-') + ' | رقم التواصل: ' + e(d.phone || '-'));
  lines.push('النشاط: ' + e(d.activity || '-') + ' | عدد الفروع: ' + e(d.branches || '-') + ' | المستخدمين: ' + e(d.users_count || '-'));
  lines.push('مطبخ / مصنع مركزي: ' + e(d.warehouse || '-') + ' | عدد المخازن: ' + e(d.warehouse_count || '-'));
  lines.push('المسؤول: ' + e(d.contact || '-') + ' | الدولة: ' + e(d.country || '-'));
  lines.push('');
  lines.push('النظام الحالي: ' + e(d.has_system || '-') + (d.sys_name ? (' — ' + e(d.sys_name)) : '') + (d.sys_age ? (' — منذ ' + e(d.sys_age)) : '') + (d.sys_type ? (' — ' + e(d.sys_type)) : ''));
  lines.push('');
  const problems = d.problems || [];
  lines.push('المشاكل:');
  if (problems.length === 0) lines.push('  (لا يوجد)');
  problems.forEach((p, i) => lines.push('  ' + (i + 1) + '. ' + e(p.issue) + (p.detail ? (' — ' + e(p.detail)) : '') + (p.priority ? (' [' + e(p.priority) + ']') : '')));
  lines.push('');
  lines.push('الاحتياجات والتقارير: ' + e(d.needs || '-'));
  lines.push('');
  const modules = d.modules || [];
  lines.push('الموديولات المطلوبة: ' + (modules.length ? e(modules.join('، ')) : '-'));
  lines.push('');
  lines.push('حضور الديمو: ' + e(d.attendees || '-') + ' | صاحب القرار: ' + e(d.decision || '-'));
  lines.push('الإدارة المالية: ' + e(d.finance || '-') + ' | التشغيل: ' + e(d.ops || '-'));
  lines.push('');
  lines.push('الديمو المقترح: ' + e(d.demo_date || '-') + ' ' + e(d.demo_time || '') + ' — ' + e(d.demo_place || '-'));
  return lines.join('\n');
}

function collectProblemsFromDom(containerId) {
  const rows = document.querySelectorAll('#' + containerId + ' .problem-row');
  const out = [];
  rows.forEach(r => {
    const idPrefix = r.getAttribute('data-id');
    const issue = document.getElementById(idPrefix + '_issue').value.trim();
    const detail = document.getElementById(idPrefix + '_detail').value.trim();
    const priority = document.getElementById(idPrefix + '_priority').value;
    if (issue || detail) out.push({ issue, detail, priority });
  });
  return out;
}

</script>
<script defer>
let currentProfile = null;
let allClients = [];
let profilesById = {};
let currentFilter = 'pending';
let selectedClientId = null;

(async function init() {
  currentProfile = await requireRole(['support', 'admin']);
  if (!currentProfile) return;
  renderSidebar('review', currentProfile);
  document.getElementById('who').textContent = (currentProfile.full_name || 'تيكنيكال سبورت');

  const { data: profiles } = await sb.from('profiles').select('*');
  (profiles || []).forEach(p => profilesById[p.id] = p);

  await loadClients();
  setFilter('pending');
})();

async function loadClients() {
  const { data, error } = await sb.from('clients').select('*').order('created_at', { ascending: false });
  if (error) { showToast('خطأ: ' + error.message, 'error'); return; }
  allClients = data || [];
  renderList();
}

function setFilter(f) {
  currentFilter = f;
  document.getElementById('filter-pending').classList.toggle('active', f === 'pending');
  document.getElementById('filter-all').classList.toggle('active', f === 'all');
  renderList();
}

function filteredClients() {
  const search = document.getElementById('support-search').value.trim().toLowerCase();
  let items = currentFilter === 'pending' ? allClients.filter(c => c.review_status === 'بانتظار المراجعة') : allClients;
  if (search) {
    items = items.filter(c => (c.name || '').toLowerCase().includes(search) || (c.phone || '').toLowerCase().includes(search));
  }
  return items;
}

function renderList() {
  const items = filteredClients();
  const el = document.getElementById('support-list');
  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state">لا توجد نماذج هنا</div>';
    return;
  }
  el.innerHTML = items.map(c => {
    const salesName = (profilesById[c.sales_id] && (profilesById[c.sales_id].full_name || profilesById[c.sales_id].email)) || '-';
    return `
    <div class="support-list-item${c.id === selectedClientId ? ' active' : ''}" data-client-id="${c.id}">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
        <span style="font-weight:700; font-size:13.5px;">${escapeHtml(c.name || '-')}</span>
        <span class="badge-pill ${reviewBadgeClass(c.review_status)}" style="font-size:10.5px;">${escapeHtml(c.review_status)}</span>
      </div>
      <div class="hint" style="font-size:11.5px;">السيلز: ${escapeHtml(salesName)} | ${escapeHtml(stageLabel(c.stage))}</div>
    </div>`;
  }).join('');

  el.querySelectorAll('[data-client-id]').forEach(item => {
    item.addEventListener('click', () => {
      selectedClientId = item.getAttribute('data-client-id');
      renderList();
      renderDetail();
    });
  });
}

async function renderDetail() {
  const c = allClients.find(x => x.id === selectedClientId);
  const panel = document.getElementById('support-detail');
  if (!c) { panel.innerHTML = '<div class="empty-state">اختار عميل من القائمة على اليمين عشان تشوف تفاصيله</div>'; return; }

  panel.innerHTML = '<div class="empty-state"><span class="spinner"></span> جارِ التحميل...</div>';
  const { data: debriefs } = await sb.from('debriefs').select('*').eq('client_id', c.id).order('created_at', { ascending: false });

  const salesName = (profilesById[c.sales_id] && (profilesById[c.sales_id].full_name || profilesById[c.sales_id].email)) || '-';

  panel.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; flex-wrap:wrap; gap:8px;">
      <div>
        <div class="card-title" style="margin:0;">${escapeHtml(c.name || '-')}</div>
        <div class="hint">السيلز: ${escapeHtml(salesName)} | ${escapeHtml(stageLabel(c.stage))} | ${escapeHtml(c.phone || '-')}</div>
      </div>
      ${c.stage === 'won' && c.implementation_stage ? `<span class="badge-pill ${implementationBadgeClass(c.implementation_stage)}">${escapeHtml(c.implementation_stage)}</span>` : ''}
    </div>

    <div class="segmented" style="margin:14px 0;">
      <button class="seg-btn seg-pending${c.review_status === 'بانتظار المراجعة' ? ' active' : ''}" data-status="بانتظار المراجعة">بانتظار المراجعة</button>
      <button class="seg-btn seg-received${c.review_status === 'تم الاستلام' ? ' active' : ''}" data-status="تم الاستلام">تم الاستلام</button>
      <button class="seg-btn seg-needs${c.review_status === 'يحتاج استكمال' ? ' active' : ''}" data-status="يحتاج استكمال">يحتاج استكمال</button>
    </div>

    <div class="summary-box">${buildClientSummary(c)}</div>

    ${c.stage === 'won' ? `
    <div class="card-title" style="margin-top:16px;">مرحلة التنفيذ</div>
    <div class="field">
      <select id="detail-impl-select">
        <option value="">لم تبدأ بعد</option>
        ${IMPLEMENTATION_STAGES.map(s => `<option value="${s}" ${c.implementation_stage === s ? 'selected' : ''}>${s}</option>`).join('')}
      </select>
    </div>
    <button class="btn-secondary" style="margin-top:8px;" onclick="saveImplementationStage('${c.id}')">حفظ مرحلة التنفيذ</button>
    ` : ''}

    <div class="card-title" style="margin-top:18px;">Debrief</div>
    <div id="debrief-list">${(debriefs || []).map(db => `
      <div class="hint" style="margin-bottom:8px; padding:8px; background:var(--blue-50); border-radius:8px;">
        ${new Date(db.created_at).toLocaleDateString('ar-EG')}<br>
        إيجابيات: ${escapeHtml(db.went_well || '-')}<br>اعتراضات: ${escapeHtml(db.objections || '-')}<br>الخطوة التالية: ${escapeHtml(db.next_step || '-')}
      </div>`).join('') || '<div class="hint">لا يوجد Debrief بعد</div>'}
    </div>
    <div class="grid2" style="margin-top:8px;">
      <div class="field"><label>إيجابيات</label><input id="db-well" type="text"></div>
      <div class="field"><label>اعتراضات</label><input id="db-obj" type="text"></div>
    </div>
    <div class="field" style="margin-top:8px;"><label>الخطوة التالية</label><input id="db-next" type="text"></div>
    <button class="btn-secondary" style="margin-top:8px;" onclick="addDebrief('${c.id}')">إضافة Debrief</button>

    <div style="display:flex; gap:8px; margin-top:18px; flex-wrap:wrap;">
      <a href="report.html?client=${c.id}" class="btn-secondary" style="text-decoration:none; display:inline-block;">تقرير Go-Live</a>
      <button class="btn-secondary" onclick='exportClientPdf(${JSON.stringify(c.id)})'>تصدير بيانات العميل PDF</button>
    </div>
  `;

  panel.querySelectorAll('.segmented .seg-btn').forEach(btn => {
    btn.addEventListener('click', () => setReview(c.id, btn.getAttribute('data-status')));
  });
}

async function setReview(clientId, status) {
  await sb.from('clients').update({ review_status: status }).eq('id', clientId);
  showToast('تم تحديث حالة المراجعة', 'success');
  await loadClients();
  if (selectedClientId === clientId) renderDetail();
}

async function saveImplementationStage(clientId) {
  const value = document.getElementById('detail-impl-select').value || null;
  await sb.from('clients').update({ implementation_stage: value }).eq('id', clientId);
  showToast('تم تحديث مرحلة التنفيذ', 'success');
  await loadClients();
  renderDetail();
}

async function addDebrief(clientId) {
  const d = {
    client_id: clientId, created_by: currentProfile.id,
    went_well: document.getElementById('db-well').value.trim(),
    objections: document.getElementById('db-obj').value.trim(),
    next_step: document.getElementById('db-next').value.trim(),
  };
  await sb.from('debriefs').insert(d);
  showToast('تمت إضافة الـ Debrief', 'success');
  renderDetail();
}

async function exportClientPdf(clientId) {
  const c = allClients.find(x => x.id === clientId);
  if (!c) { showToast('تعذر إيجاد بيانات العميل', 'error'); return; }

  const [{ data: debriefs }, { data: activities }] = await Promise.all([
    sb.from('debriefs').select('*').eq('client_id', clientId).order('created_at', { ascending: false }),
    sb.from('activities').select('*').eq('client_id', clientId).order('activity_date', { ascending: false }),
  ]);
  const files = await listClientFiles(clientId);

  const summaryHtml = escapeHtml(buildClientSummary(c)).split('\n').join('<br>');
  const debriefsHtml = (debriefs || []).map(db => `
    <div style="margin-bottom:8px;">
      <b>${new Date(db.created_at).toLocaleDateString('ar-EG')}</b> —
      إيجابيات: ${escapeHtml(db.went_well || '-')} | اعتراضات: ${escapeHtml(db.objections || '-')} | الخطوة التالية: ${escapeHtml(db.next_step || '-')}
    </div>`).join('') || '<div>لا يوجد Debrief مسجّل</div>';
  const activitiesHtml = (activities || []).map(a =>
    `<div>${a.activity_date} — ${escapeHtml(a.activity_type)}${a.notes ? (' — ' + escapeHtml(a.notes)) : ''}</div>`
  ).join('') || '<div>لا يوجد نشاط مسجّل</div>';
  const filesHtml = (files || []).length
    ? files.map(f => `<div>${escapeHtml(f.name.replace(/^\d+_/, ''))}</div>`).join('')
    : '<div>لا يوجد مرفقات</div>';
  const implRow = c.stage === 'won'
    ? `<p><b>مرحلة التنفيذ:</b> ${escapeHtml(c.implementation_stage || 'لم تبدأ بعد')}</p>`
    : '';

  document.getElementById('print-view').innerHTML = `
    <div style="font-family:'Almarai','Tajawal',sans-serif; direction:rtl;">
      <h2 style="color:#0B2C52;">بيانات العميل: ${escapeHtml(c.name)}</h2>
      <p><b>المرحلة الحالية:</b> ${escapeHtml(stageLabel(c.stage))} | <b>حالة المراجعة:</b> ${escapeHtml(c.review_status)}</p>
      ${implRow}
      <h3>ملخص بيانات الاكتشاف</h3>
      <p>${summaryHtml}</p>
      <h3>سجل النشاط</h3>
      ${activitiesHtml}
      <h3>سجل الـ Debrief</h3>
      ${debriefsHtml}
      <h3>المرفقات</h3>
      ${filesHtml}
      <p style="margin-top:20px; color:#888; font-size:11px;">تم التصدير بتاريخ ${new Date().toLocaleDateString('ar-EG')}</p>
    </div>
  `;
  printInLightMode();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة العملاء — التيكنيكال سبورت</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="wrap" style="position:relative;">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">UIS</div>
      <div>
        <div class="brand-title">مراجعة التيكنيكال سبورت</div>
        <div class="brand-sub" id="who">...</div>
      </div>
    </div>
    <div class="nav-links">
      <button class="nav-link" id="filter-pending" onclick="setFilter('pending')">بانتظار المراجعة</button>
      <button class="nav-link" id="filter-all" onclick="setFilter('all')">الكل</button>
      <button class="btn-logout" onclick="logout()">خروج</button>
    </div>
  </div>

  <div id="list"><div class="empty-state"><span class="spinner"></span> جارِ التحميل...</div></div>
</div>

<div id="modal-root"></div>

<script src="assets/app.js"></script>
<script>
let currentProfile = null;
let allClients = [];
let profilesById = {};
let currentFilter = 'pending';

(async function init() {
  currentProfile = await requireRole(['support', 'admin']);
  if (!currentProfile) return;
  document.getElementById('who').textContent = (currentProfile.full_name || 'تيكنيكال سبورت');
  await loadProfiles();
  await loadClients();
  setFilter('pending');
})();

async function loadProfiles() {
  const { data } = await sb.from('profiles').select('*');
  (data || []).forEach(p => profilesById[p.id] = p);
}

async function loadClients() {
  const { data, error } = await sb.from('clients').select('*').order('created_at', { ascending: false });
  if (error) { showToast('خطأ: ' + error.message, 'error'); return; }
  allClients = data || [];
  render();
}

function setFilter(f) {
  currentFilter = f;
  document.getElementById('filter-pending').classList.toggle('active', f === 'pending');
  document.getElementById('filter-all').classList.toggle('active', f === 'all');
  render();
}

function render() {
  const el = document.getElementById('list');
  const items = currentFilter === 'pending' ? allClients.filter(c => c.review_status === 'بانتظار المراجعة') : allClients;
  if (items.length === 0) { el.innerHTML = '<div class="hint">لا توجد نماذج هنا.</div>'; return; }
  el.innerHTML = '';
  items.forEach(c => {
    const salesName = (profilesById[c.sales_id] && profilesById[c.sales_id].full_name) || '-';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
        <div class="card-title" style="margin:0;">${escapeHtml(c.name || '-')}</div>
        <div style="display:flex; gap:6px;">
          <span class="badge-pill ${reviewBadgeClass(c.review_status)}">${escapeHtml(c.review_status)}</span>
          ${c.stage === 'won' && c.implementation_stage ? `<span class="badge-pill ${implementationBadgeClass(c.implementation_stage)}">${escapeHtml(c.implementation_stage)}</span>` : ''}
        </div>
      </div>
      <div class="hint" style="margin-bottom:8px;">السيلز: ${escapeHtml(salesName)} | المرحلة: ${stageLabel(c.stage)} | تليفون العميل: ${escapeHtml(c.phone || '-')}</div>
      <div class="summary-box">${buildClientSummary(c)}</div>
      ${c.stage === 'won' ? `
      <div class="field" style="margin-top:10px;">
        <label>مرحلة التنفيذ</label>
        <select data-impl-select="${c.id}">
          <option value="">لم تبدأ بعد</option>
          ${IMPLEMENTATION_STAGES.map(s => `<option value="${s}" ${c.implementation_stage === s ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
      </div>` : ''}
      <div style="display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;">
        <button class="btn-secondary" onclick="setReview('${c.id}','تم الاستلام')">تحديد كمستلم</button>
        <button class="btn-secondary" onclick="setReview('${c.id}','يحتاج استكمال')">يحتاج استكمال</button>
        <button class="btn-secondary" onclick="openDebriefModal('${c.id}')">إضافة Debrief</button>
        <a href="report.html?client=${c.id}" class="btn-secondary" style="text-decoration:none; display:inline-block;">تقرير Go-Live</a>
        ${c.stage === 'won' ? `<button class="btn-primary" data-impl-save="${c.id}">حفظ مرحلة التنفيذ</button>` : ''}
      </div>
    `;
    if (c.stage === 'won') {
      const saveBtn = card.querySelector(`[data-impl-save="${c.id}"]`);
      saveBtn.addEventListener('click', async () => {
        const select = card.querySelector(`[data-impl-select="${c.id}"]`);
        await sb.from('clients').update({ implementation_stage: select.value || null }).eq('id', c.id);
        showToast('تم تحديث مرحلة التنفيذ', 'success');
        await loadClients();
      });
    }
    el.appendChild(card);
  });
}

async function setReview(clientId, status) {
  await sb.from('clients').update({ review_status: status }).eq('id', clientId);
  showToast('تم تحديث حالة المراجعة', 'success');
  await loadClients();
  render();
}

async function openDebriefModal(clientId) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
  <div class="modal-overlay" style="position:fixed;">
    <div class="modal-box" style="max-width:420px;">
      <div class="modal-head"><div class="card-title" style="margin:0;">إضافة Debrief</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="field"><label>إيجابيات الديمو</label><input id="db_well" type="text"></div>
      <div class="field"><label>اعتراضات</label><input id="db_obj" type="text"></div>
      <div class="field"><label>الخطوة التالية</label><input id="db_next" type="text"></div>
      <button class="btn-primary" style="width:100%; margin-top:10px;" onclick="saveDebrief('${clientId}')">حفظ</button>
    </div>
  </div>`;
}

async function saveDebrief(clientId) {
  const d = {
    client_id: clientId, created_by: currentProfile.id,
    went_well: document.getElementById('db_well').value.trim(),
    objections: document.getElementById('db_obj').value.trim(),
    next_step: document.getElementById('db_next').value.trim(),
  };
  await sb.from('debriefs').insert(d);
  showToast('تمت إضافة الـ Debrief', 'success');
  closeModal();
}

function closeModal() { document.getElementById('modal-root').innerHTML = ''; }
</script>
</body>
</html>

function loadScriptTag(src) {
  return new Promise((resolve, reject) => {
    const el = document.createElement('script');
    el.src = src;
    el.onload = () => resolve();
    el.onerror = () => reject(new Error('failed to load ' + src));
    document.head.appendChild(el);
  });
}

let _libLoadPromise = null;
function loadSupabaseLib() {
  if (typeof supabase !== 'undefined') return Promise.resolve();
  if (_libLoadPromise) return _libLoadPromise;
  _libLoadPromise = SUPABASE_LIB_SOURCES.reduce(
    (chain, src) => chain.catch(() => loadScriptTag(src)),
    Promise.reject()
  );
  return _libLoadPromise;
}

// ---------- تحميل مكتبة Chart.js ديناميكيًا (مستخدمة في لوحة الإدارة بس) ----------

  ];
  _chartLibPromise = sources.reduce(
    (chain, src) => chain.catch(() => loadScriptTag(src)),
    Promise.reject()
  );

}

}

// ---------- الأمان: تنظيف أي نص المستخدم كتبه قبل حقنه في الصفحة ----------
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// احتمالية الإغلاق التلقائية حسب المرحلة — تقدر تعدّل النسب دي براحتك
const STAGE_PROBABILITY = {
  discovery: 0.10, demo_scheduled: 0.25, demo_done: 0.40,
  proposal: 0.60, negotiation: 0.75, won: 1, lost: 0,
};

// سعر الصرف التقريبي لكل عملة مقابل الدولار — عدّل الأرقام دي لما الأسعار تتغيّر
const CURRENCY_TO_USD = { EGP: 1 / 49, KWD: 3.25, OMR: 2.6 };

function weightedValue(client) {
  const val = Number(client.deal_value) || 0;
  const prob = STAGE_PROBABILITY[client.stage] ?? 0;
  return val * prob;
}

function toUSD(amount, currency) {
  const rate = CURRENCY_TO_USD[currency] || 1;
  return (Number(amount) || 0) * rate;
}

function formatMoney(amount, currency) {
  const n = Number(amount) || 0;
  return Math.round(n).toLocaleString('ar-EG') + (currency ? (' ' + currency) : '');
}

function monthKey(dateStr) {
  if (!dateStr) return null;
  return dateStr.slice(0, 7); // "2026-07-15" → "2026-07"
}

// ---------- تجربة الاستخدام: تنبيهات Toast بدل alert() ----------
function showToast(message, type = 'info') {
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('toast-show'));
  setTimeout(() => {
    toast.classList.remove('toast-show');
    setTimeout(() => toast.remove(), 250);
  }, 3200);
}

const COUNTRY_DIAL_CODES = { 'مصر': '20', 'الكويت': '965', 'عُمان': '968' };

function whatsappLink(phone, country) {
  if (!phone) return null;
  const raw = phone.trim();
  let digits = raw.replace(/[^\d]/g, '');
  if (!digits) return null;

  // الرقم مكتوب بمفتاح دولة صريح (+20، +965...) — يكفي نشيل الرموز بس
  if (raw.startsWith('+')) {
    return 'https://wa.me/' + digits;
  }

  // الرقم محلي (بيبدأ بصفر) — نضيف مفتاح الدولة بناءً على دولة العميل
  if (raw.startsWith('0')) {
    const code = COUNTRY_DIAL_CODES[country];
    if (code) {
      digits = code + digits.replace(/^0+/, '');
      return 'https://wa.me/' + digits;
    }
  }

  // مش عارفين الدولة، نستخدم الأرقام زي ما هي (أفضل من مفيش رابط خالص)
  return 'https://wa.me/' + digits;
}

// ---------- مرفقات العميل (Supabase Storage) ----------
async function uploadClientFile(clientId, file) {
  const path = clientId + '/' + Date.now() + '_' + file.name.replace(/[^\w.\-]/g, '_');
  const { error } = await sb.storage.from('client-files').upload(path, file);
  if (error) throw error;
  return path;
}

async function listClientFiles(clientId) {
  const { data, error } = await sb.storage.from('client-files').list(clientId, { sortBy: { column: 'created_at', order: 'desc' } });
  if (error) return [];
  return data || [];
}

async function getClientFileUrl(clientId, filename) {
  const { data, error } = await sb.storage.from('client-files').createSignedUrl(clientId + '/' + filename, 3600);
  if (error) return null;
  return data.signedUrl;
}

async function deleteClientFile(clientId, filename) {
  await sb.storage.from('client-files').remove([clientId + '/' + filename]);
}

function reviewBadgeClass(status) {
  if (status === 'تم الاستلام') return 'badge-received';
  if (status === 'يحتاج استكمال') return 'badge-needs';
  return 'badge-pending';
}

// ---------- Auth helpers ----------
async function getCurrentProfile() {
  try {
    await ensureSb();
  } catch (e) {
    return null;
  }
  try {
    const { data: sessionData } = await sb.auth.getSession();
    if (!sessionData || !sessionData.session) return null;
    const userId = sessionData.session.user.id;
    const { data, error } = await sb.from('profiles').select('*').eq('id', userId).single();
    if (error) return null;
    return data;
  } catch (e) {
    console.error('getCurrentProfile failed:', e);
    return null;
  }
}

async function requireRole(allowedRoles) {
  const profile = await getCurrentProfile();
  if (!profile) {
    window.location.href = 'login.html';
    return null;
  }
  if (!allowedRoles.includes(profile.role)) {
    window.location.href = 'login.html';
    return null;
  }
  return profile;
}

async function logout() {
  try { await ensureSb(); if (sb) await sb.auth.signOut(); } catch (e) {}
  window.location.href = 'login.html';
}

// ---------- Summary builder (used everywhere a client record is displayed) ----------
function buildClientSummary(d) {
  const e = escapeHtml;
  let lines = [];
  lines.push('العميل: ' + e(d.name || '-') + ' | رقم التواصل: ' + e(d.phone || '-'));
  lines.push('النشاط: ' + e(d.activity || '-') + ' | عدد الفروع: ' + e(d.branches || '-') + ' | المستخدمين: ' + e(d.users_count || '-'));
  lines.push('مطبخ / مصنع مركزي: ' + e(d.warehouse || '-') + ' | عدد المخازن: ' + e(d.warehouse_count || '-'));
  lines.push('المسؤول: ' + e(d.contact || '-') + ' | الدولة: ' + e(d.country || '-'));
  lines.push('');
  lines.push('النظام الحالي: ' + e(d.has_system || '-') + (d.sys_name ? (' — ' + e(d.sys_name)) : '') + (d.sys_age ? (' — منذ ' + e(d.sys_age)) : '') + (d.sys_type ? (' — ' + e(d.sys_type)) : ''));
  lines.push('');
  const problems = d.problems || [];
  lines.push('المشاكل:');
  if (problems.length === 0) lines.push('  (لا يوجد)');
  problems.forEach((p, i) => lines.push('  ' + (i + 1) + '. ' + e(p.issue) + (p.detail ? (' — ' + e(p.detail)) : '') + (p.priority ? (' [' + e(p.priority) + ']') : '')));
  lines.push('');
  lines.push('الاحتياجات والتقارير: ' + e(d.needs || '-'));
  lines.push('');
  const modules = d.modules || [];
  lines.push('الموديولات المطلوبة: ' + (modules.length ? e(modules.join('، ')) : '-'));
  lines.push('');
  lines.push('حضور الديمو: ' + e(d.attendees || '-') + ' | صاحب القرار: ' + e(d.decision || '-'));
  lines.push('الإدارة المالية: ' + e(d.finance || '-') + ' | التشغيل: ' + e(d.ops || '-'));
  lines.push('');
  lines.push('الديمو المقترح: ' + e(d.demo_date || '-') + ' ' + e(d.demo_time || '') + ' — ' + e(d.demo_place || '-'));
  return lines.join('\n');
}

function collectProblemsFromDom(containerId) {
  const rows = document.querySelectorAll('#' + containerId + ' .problem-row');
  const out = [];
  rows.forEach(r => {
    const idPrefix = r.getAttribute('data-id');
    const issue = document.getElementById(idPrefix + '_issue').value.trim();
    const detail = document.getElementById(idPrefix + '_detail').value.trim();
    const priority = document.getElementById(idPrefix + '_priority').value;
    if (issue || detail) out.push({ issue, detail, priority });
  });
  return out;
}

<script defer>
let currentProfile = null;
let allClients = [];

(async function init() {
  currentProfile = await requireRole(['sales', 'admin', 'support']);
  if (!currentProfile) return;
  renderSidebar('pipeline', currentProfile);
  document.getElementById('who').textContent = (currentProfile.full_name || 'سيلز');
  await loadClients();
})();

async function loadClients() {
  const { data, error } = await sb.from('clients').select('*').eq('sales_id', currentProfile.id).order('created_at', { ascending: false });
  if (error) { showToast('خطأ في تحميل العملاء: ' + error.message, 'error'); return; }
  allClients = data || [];
  renderKanban();
}

function renderKanban() {
  const el = document.getElementById('kanban');
  el.innerHTML = '';
  STAGES.forEach(stage => {
    const col = document.createElement('div');
    col.className = 'kanban-col';
    col.style.borderTop = `3px solid ${STAGE_COLORS[stage.key] || 'var(--blue-500)'}`;
    const items = allClients.filter(c => c.stage === stage.key);
    col.innerHTML = `<div class="kanban-col-title"><span>${stage.label}</span><span>${items.length}</span></div>`;
    if (items.length === 0) {
      col.innerHTML += '<div class="hint" style="text-align:center; padding:16px 4px;">لا يوجد عملاء هنا</div>';
    }
    items.forEach(c => {
      const card = document.createElement('div');
      card.className = 'kanban-card';
      card.onclick = () => openClientModal(c);
      const isOverdue = c.next_follow_up_date && c.next_follow_up_date < new Date().toISOString().slice(0, 10) && c.stage !== 'won' && c.stage !== 'lost';
      card.innerHTML = `
        <div class="kanban-card-name">${escapeHtml(c.name || '-')}</div>
        <div class="kanban-card-meta">${escapeHtml(c.phone || '')}</div>
        <div class="kanban-card-meta">${c.deal_value ? formatMoney(c.deal_value, c.currency) : ''}</div>
        <div style="margin-top:6px; display:flex; gap:6px; flex-wrap:wrap;">

          ${c.stage === 'won' && c.implementation_stage ? `<span class="badge-pill ${implementationBadgeClass(c.implementation_stage)}">${escapeHtml(c.implementation_stage)}</span>` : ''}
          ${isOverdue ? '<span class="badge-pill badge-needs">متابعة متأخرة</span>' : ''}
        </div>
      `;
      col.appendChild(card);
    });
    el.appendChild(col);
  });
}

  contactCounters[containerId] = (contactCounters[containerId] || 0) + 1;

async function submitNewClient() {
  const errEl = document.getElementById('new-error');
  const btn = document.getElementById('new-client-save-btn');
  errEl.style.display = 'none';
  const name = v('new_name');
  if (!name) { errEl.textContent = 'اكتب اسم العميل.'; errEl.style.display = 'block'; return; }
  btn.disabled = true;
  btn.innerHTML = 'جارِ الحفظ<span class="spinner"></span>';
  const d = {
    name, phone: v('new_phone'), country: v('new_country'),
    activity: v('new_activity'), branches: v('new_branches'), users_count: v('new_users'),
    warehouse: v('new_warehouse'), warehouse_count: v('new_warehouseCount'), contact: v('new_contact'), visit_date: v('new_date'),
    lead_source: v('new_leadSource'),
    has_system: v('new_hasSystem'), sys_name: v('new_sysName'), sys_age: v('new_sysAge'), sys_type: v('new_sysType'),
    problems: collectProblemsFromDom('new_problems'), needs: v('new_needs'),
    modules: collectModulesFrom('new'),
    deal_value: v('new_dealValue'), currency: v('new_currency') || 'EGP', expected_close_date: v('new_expectedClose'),
    attendees: v('new_attendees'), decision: v('new_decision'), finance: v('new_finance'), ops: v('new_ops'),
    demo_date: v('new_demoDate'), demo_time: v('new_demoTime'), demo_place: v('new_demoPlace'),
    next_follow_up_date: v('new_nextFollowUp'),
    contacts: collectContactsFromDom('new_contacts'),
    sales_id: currentProfile.id, stage: 'discovery', review_status: 'بانتظار المراجعة',
  };
  const { error } = await sb.from('clients').insert(d);
  if (error) {
    errEl.textContent = 'خطأ: ' + error.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'حفظ العميل';
    return;

  showToast('تم حفظ العميل بنجاح', 'success');

  await loadClients();
}

  renderFilesList(c.id, files);
}

async function exportClientPdf(clientId) {
  const c = allClients.find(x => x.id === clientId);
  if (!c) { showToast('تعذر إيجاد بيانات العميل', 'error'); return; }

  const [{ data: debriefs }, { data: activities }] = await Promise.all([
    sb.from('debriefs').select('*').eq('client_id', clientId).order('created_at', { ascending: false }),
    sb.from('activities').select('*').eq('client_id', clientId).order('activity_date', { ascending: false }),
  ]);
  const files = await listClientFiles(clientId);

  const summaryHtml = escapeHtml(buildClientSummary(c)).split('\n').join('<br>');

  const debriefsHtml = (debriefs || []).map(db => `
    <div style="margin-bottom:8px;">
      <b>${new Date(db.created_at).toLocaleDateString('ar-EG')}</b> —
      إيجابيات: ${escapeHtml(db.went_well || '-')} | اعتراضات: ${escapeHtml(db.objections || '-')} | الخطوة التالية: ${escapeHtml(db.next_step || '-')}
    </div>`).join('') || '<div>لا يوجد Debrief مسجّل</div>';

  const activitiesHtml = (activities || []).map(a =>
    `<div>${a.activity_date} — ${escapeHtml(a.activity_type)}${a.notes ? (' — ' + escapeHtml(a.notes)) : ''}</div>`
  ).join('') || '<div>لا يوجد نشاط مسجّل</div>';

  const filesHtml = (files || []).length
    ? files.map(f => `<div>${escapeHtml(f.name.replace(/^\d+_/, ''))}</div>`).join('')
    : '<div>لا يوجد مرفقات</div>';

  const implRow = c.stage === 'won'
    ? `<p><b>مرحلة التنفيذ:</b> ${escapeHtml(c.implementation_stage || 'لم تبدأ بعد')}</p>`
    : '';

  document.getElementById('print-view').innerHTML = `
    <div style="font-family:'Almarai','Tajawal',sans-serif; direction:rtl;">
      <h2 style="color:#0B2C52;">بيانات العميل: ${escapeHtml(c.name)}</h2>
      <p><b>المرحلة الحالية:</b> ${escapeHtml(stageLabel(c.stage))} | <b>حالة المراجعة:</b> ${escapeHtml(c.review_status)}</p>
      ${implRow}
      <h3>ملخص بيانات الاكتشاف</h3>
      <p>${summaryHtml}</p>
      <h3>سجل النشاط</h3>
      ${activitiesHtml}
      <h3>سجل الـ Debrief</h3>
      ${debriefsHtml}
      <h3>المرفقات</h3>
      ${filesHtml}
      <p style="margin-top:20px; color:#888; font-size:11px;">تم التصدير بتاريخ ${new Date().toLocaleDateString('ar-EG')}</p>
    </div>
  `;
  printInLightMode();
}

async function renderFilesList(clientId, files) {
  const listEl = document.getElementById('files-list');
  if (!listEl || files.length === 0) return;
  const canDelete = currentProfile.role === 'admin' || currentProfile.role === 'support';
  const rows = await Promise.all(files.map(async (f) => {
    const url = await getClientFileUrl(clientId, f.name);
    return `
      <div class="hint" style="margin-bottom:6px; padding:8px; background:var(--blue-50); border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
        <a href="${url || '#'}" target="_blank" rel="noopener">${escapeHtml(f.name.replace(/^\d+_/, ''))}</a>
        ${canDelete ? `<button data-del-file="${escapeHtml(f.name)}" style="border:none;background:transparent;color:#C0392B;cursor:pointer;">حذف</button>` : ''}
      </div>`;
  }));
  listEl.innerHTML = rows.join('');
  listEl.querySelectorAll('[data-del-file]').forEach(btn => {
    btn.addEventListener('click', async () => {
      await deleteClientFile(clientId, btn.getAttribute('data-del-file'));
      const c = allClients.find(x => x.id === clientId);
      openClientModal(c);
    });
  });
}

async function uploadFile(clientId) {
  const input = document.getElementById('file-input-' + clientId);
  if (!input.files || input.files.length === 0) { showToast('اختار ملف الأول', 'error'); return; }
  try {
    await uploadClientFile(clientId, input.files[0]);
    showToast('تم رفع الملف', 'success');
    const c = allClients.find(x => x.id === clientId);
    openClientModal(c);
  } catch (e) {
    showToast('تعذر رفع الملف: ' + e.message, 'error');
  }
}

async function saveContacts(clientId) {
  const c = allClients.find(x => x.id === clientId);
  const existing = c.contacts || [];
  const added = collectContactsFromDom('new-contacts-' + clientId);
  const contacts = existing.concat(added);
  await sb.from('clients').update({ contacts }).eq('id', clientId);
  showToast('تم حفظ جهات الاتصال', 'success');
  await loadClients();
  const updated = allClients.find(x => x.id === clientId);
  openClientModal(updated);
}

async function updateStage(clientId) {
  const stage = document.getElementById('stage-select').value;
  const next_follow_up_date = document.getElementById('next-follow-up').value;
  const loss_reason = document.getElementById('loss-reason').value || null;
  await sb.from('clients').update({ stage, next_follow_up_date, loss_reason }).eq('id', clientId);
  showToast('تم تحديث المرحلة', 'success');
  closeModal();
  await loadClients();
}

async function updateFinancials(clientId) {
  const d = {
    deal_value: document.getElementById('deal-value').value || 0,
    currency: document.getElementById('deal-currency').value,
    expected_close_date: document.getElementById('deal-close').value,
    lead_source: document.getElementById('deal-leadsource').value || null,
  };
  await sb.from('clients').update(d).eq('id', clientId);
  showToast('تم حفظ البيانات المالية', 'success');
  closeModal();
  await loadClients();
}

async function updateRenewal(clientId) {
  const d = {
    contract_start_date: document.getElementById('contract-start').value,
    renewal_date: document.getElementById('renewal-date').value,
    renewal_value: document.getElementById('renewal-value').value || 0,
  };
  await sb.from('clients').update(d).eq('id', clientId);
  showToast('تم حفظ بيانات العقد', 'success');

  await loadClients();

async function updateImplementationStage(clientId) {
  const stage = document.getElementById('impl-stage').value || null;
  await sb.from('clients').update({ implementation_stage: stage }).eq('id', clientId);
  showToast('تم تحديث مرحلة التنفيذ', 'success');
  closeModal();
  await loadClients();
}

async function addDebrief(clientId) {
  const d = { client_id: clientId, created_by: currentProfile.id, went_well: v('db_well'), objections: v('db_obj'), next_step: v('db_next') };
  await sb.from('debriefs').insert(d);
  showToast('تمت إضافة الـ Debrief', 'success');
  const c = allClients.find(x => x.id === clientId);
  openClientModal(c);
}

async function logActivity(clientId) {
  const d = {
    client_id: clientId,
    sales_id: currentProfile.id,
    activity_type: document.getElementById('act-type').value,
    activity_date: document.getElementById('act-date').value || new Date().toISOString().slice(0, 10),
    notes: document.getElementById('act-notes').value.trim(),
  };
  await sb.from('activities').insert(d);
  showToast('تم تسجيل النشاط', 'success');
  const c = allClients.find(x => x.id === clientId);
  openClientModal(c);
}

function closeModal() { document.getElementById('modal-root').innerHTML = ''; }
</script>

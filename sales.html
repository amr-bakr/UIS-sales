<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة العملاء — السيلز</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="app-shell">
<div class="sidebar" id="sidebar-root"></div>
<div class="main-content">
<div class="wrap" style="position:relative;">
  <div class="topbar">
    <div>
      <div class="brand-title">عملائي</div>
      <div class="brand-sub" id="who">...</div>
    </div>
    <div class="nav-links">
      <button class="btn-primary" onclick="openNewClientModal()">+ عميل جديد</button>
    </div>
  </div>

  <div class="kanban" id="kanban"><div class="empty-state"><span class="spinner"></span> جارِ تحميل العملاء...</div></div>
</div>

<div id="modal-root"></div>
</div>
</div>

<script src="assets/app.js"></script>
<script>
let currentProfile = null;
let allClients = [];

(async function init() {
  currentProfile = await requireRole(['sales', 'admin', 'support']);
  if (!currentProfile) return;
  renderSidebar('pipeline', currentProfile);
  document.getElementById('who').textContent = (currentProfile.full_name || 'سيلز');
  await loadClients();
})();

async function loadClients() {
  const { data, error } = await sb.from('clients').select('*').eq('sales_id', currentProfile.id).order('created_at', { ascending: false });
  if (error) { showToast('خطأ في تحميل العملاء: ' + error.message, 'error'); return; }
  allClients = data || [];
  renderKanban();
}

function renderKanban() {
  const el = document.getElementById('kanban');
  el.innerHTML = '';
  STAGES.forEach(stage => {
    const col = document.createElement('div');
    col.className = 'kanban-col';
    const items = allClients.filter(c => c.stage === stage.key);
    col.innerHTML = `<div class="kanban-col-title"><span>${stage.label}</span><span>${items.length}</span></div>`;
    if (items.length === 0) {
      col.innerHTML += '<div class="hint" style="text-align:center; padding:16px 4px;">لا يوجد عملاء هنا</div>';
    }
    items.forEach(c => {
      const card = document.createElement('div');
      card.className = 'kanban-card';
      card.onclick = () => openClientModal(c);
      const isOverdue = c.next_follow_up_date && c.next_follow_up_date < new Date().toISOString().slice(0, 10) && c.stage !== 'won' && c.stage !== 'lost';
      card.innerHTML = `
        <div class="kanban-card-name">${escapeHtml(c.name || '-')}</div>
        <div class="kanban-card-meta">${escapeHtml(c.phone || '')}</div>
        <div class="kanban-card-meta">${c.deal_value ? formatMoney(c.deal_value, c.currency) : ''}</div>
        <div style="margin-top:6px; display:flex; gap:6px; flex-wrap:wrap;">
          <span class="badge-pill ${reviewBadgeClass(c.review_status)}">${escapeHtml(c.review_status)}</span>
          ${c.stage === 'won' && c.implementation_stage ? `<span class="badge-pill ${implementationBadgeClass(c.implementation_stage)}">${escapeHtml(c.implementation_stage)}</span>` : ''}
          ${isOverdue ? '<span class="badge-pill badge-needs">متابعة متأخرة</span>' : ''}
        </div>
      `;
      col.appendChild(card);
    });
    el.appendChild(col);
  });
}

// ---------- New client modal ----------
function openNewClientModal() {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
  <div class="modal-overlay" style="position:fixed;">
    <div class="modal-box">
      <div class="modal-head"><div class="card-title" style="margin:0;">عميل جديد — نموذج الاكتشاف</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      ${discoveryFormHtml('new')}
      <div id="new-error" class="error-box" style="display:none;"></div>
      <button class="btn-primary" id="new-client-save-btn" style="width:100%; margin-top:12px;" onclick="submitNewClient()">حفظ العميل</button>
    </div>
  </div>`;
  initProblemRows('new');
}

function discoveryFormHtml(prefix) {
  return `
    <div class="grid2">
      <div class="field"><label>اسم الشركة / العميل <span class="req">*</span></label><input id="${prefix}_name" type="text"></div>
      <div class="field"><label>رقم التواصل مع العميل</label><input id="${prefix}_phone" type="tel"></div>
      <div class="field"><label>الدولة</label>
        <select id="${prefix}_country"><option value="">اختر...</option><option>مصر</option><option>الكويت</option><option>عُمان</option></select>
      </div>
      <div class="field"><label>النشاط</label>
        <select id="${prefix}_activity"><option value="">اختر...</option><option>مطعم فرع واحد</option><option>سلسلة مطاعم</option><option>كافيه</option><option>أخرى</option></select>
      </div>
      <div class="field"><label>عدد الفروع</label><input id="${prefix}_branches" type="number"></div>
      <div class="field"><label>عدد المستخدمين</label><input id="${prefix}_users" type="number"></div>
      <div class="field"><label>يوجد مطبخ / مصنع مركزي؟</label><select id="${prefix}_warehouse"><option value="">اختر...</option><option>نعم</option><option>لا</option></select></div>
      <div class="field"><label>عدد المخازن</label><input id="${prefix}_warehouseCount" type="number"></div>
      <div class="field"><label>اسم المسؤول ومنصبه</label><input id="${prefix}_contact" type="text"></div>
      <div class="field"><label>تاريخ الزيارة</label><input id="${prefix}_date" type="date"></div>
      <div class="field"><label>مصدر العميل</label>
        <select id="${prefix}_leadSource"><option value="">اختر...</option>${LEAD_SOURCES.map(s => `<option>${s}</option>`).join('')}</select>
      </div>
    </div>
    <div class="card-title" style="margin-top:16px;">النظام الحالي</div>
    <div class="grid2">
      <div class="field"><label>يعملون على نظام حالياً؟</label><select id="${prefix}_hasSystem"><option value="">اختر...</option><option>نعم</option><option>لا</option></select></div>
      <div class="field"><label>اسم النظام</label><input id="${prefix}_sysName" type="text"></div>
      <div class="field"><label>منذ متى؟</label><input id="${prefix}_sysAge" type="text"></div>
      <div class="field"><label>جاهز أم مخصص؟</label><select id="${prefix}_sysType"><option value="">اختر...</option><option>جاهز</option><option>مطوّر خصيصاً</option></select></div>
    </div>
    <div class="card-title" style="margin-top:16px;">المشاكل المكتشفة</div>
    <div id="${prefix}_problems"></div>
    <button class="btn-secondary" onclick="addProblemRow('${prefix}')">+ إضافة مشكلة</button>
    <div class="card-title" style="margin-top:16px;">الاحتياجات والتقارير</div>
    <textarea id="${prefix}_needs" rows="2"></textarea>
    <div class="card-title" style="margin-top:16px;">الموديولات المطلوبة</div>
    <div class="chips" id="${prefix}_modules">
      <label class="chip"><input type="checkbox" value="POS"> POS</label>
      <label class="chip"><input type="checkbox" value="Inventory"> Inventory</label>
      <label class="chip"><input type="checkbox" value="Purchasing"> Purchasing</label>
      <label class="chip"><input type="checkbox" value="Tablet Ordering"> Tablet Ordering</label>
      <label class="chip"><input type="checkbox" value="Accounting"> Accounting</label>
      <label class="chip"><input type="checkbox" value="Dashboard"> Dashboard</label>
    </div>
    <div class="card-title" style="margin-top:16px;">البيانات المالية</div>
    <div class="grid2">
      <div class="field"><label>قيمة الصفقة المتوقعة</label><input id="${prefix}_dealValue" type="number" min="0" placeholder="مثال: 50000"></div>
      <div class="field"><label>العملة</label>
        <select id="${prefix}_currency"><option value="EGP">جنيه مصري</option><option value="KWD">دينار كويتي</option><option value="OMR">ريال عُماني</option></select>
      </div>
      <div class="field"><label>تاريخ الإغلاق المتوقع</label><input id="${prefix}_expectedClose" type="date"></div>
    </div>
    <div class="card-title" style="margin-top:16px;">الحضور وصاحب القرار وتوصية الديمو</div>
    <div class="grid2">
      <div class="field"><label>مين هيحضر الديمو؟</label><input id="${prefix}_attendees" type="text"></div>
      <div class="field"><label>مين صاحب القرار؟</label><input id="${prefix}_decision" type="text"></div>
      <div class="field"><label>الإدارة المالية لازم تحضر؟</label><select id="${prefix}_finance"><option value="">اختر...</option><option>نعم</option><option>لا</option></select></div>
      <div class="field"><label>مسؤول التشغيل لازم يحضر؟</label><select id="${prefix}_ops"><option value="">اختر...</option><option>نعم</option><option>لا</option></select></div>
      <div class="field"><label>تاريخ الديمو المقترح</label><input id="${prefix}_demoDate" type="date"></div>
      <div class="field"><label>الساعة</label><input id="${prefix}_demoTime" type="time"></div>
      <div class="field" style="grid-column:span 2;"><label>المكان</label><input id="${prefix}_demoPlace" type="text"></div>
      <div class="field"><label>تاريخ المتابعة القادمة</label><input id="${prefix}_nextFollowUp" type="date"></div>
    </div>
    <div class="card-title" style="margin-top:16px;">جهات اتصال إضافية</div>
    <div id="${prefix}_contacts"></div>
    <button class="btn-secondary" onclick="addContactRow('${prefix}_contacts')">+ إضافة جهة اتصال</button>
  `;
}

let problemCounters = {};
function initProblemRows(prefix) { problemCounters[prefix] = 0; addProblemRow(prefix); contactCounters[prefix] = 0; }

let contactCounters = {};
function addContactRow(containerId, existing) {
  contactCounters[containerId] = (contactCounters[containerId] || 0) + 1;
  const rid = containerId + '_c' + contactCounters[containerId];
  const div = document.createElement('div');
  div.className = 'contact-row';
  div.setAttribute('data-id', rid);
  div.style.cssText = 'display:grid; grid-template-columns:1fr 1fr 1fr 28px; gap:6px; margin-bottom:6px;';
  div.innerHTML = `
    <input type="text" placeholder="الاسم" id="${rid}_name" value="${escapeHtml((existing && existing.name) || '')}">
    <input type="text" placeholder="المنصب (صاحب قرار، مالية...)" id="${rid}_role" value="${escapeHtml((existing && existing.role) || '')}">
    <input type="tel" placeholder="رقم التليفون" id="${rid}_phone" value="${escapeHtml((existing && existing.phone) || '')}">
    <button onclick="this.parentElement.remove()" style="border:none;background:transparent;color:#C0392B;cursor:pointer;">✕</button>
  `;
  document.getElementById(containerId).appendChild(div);
}
function collectContactsFromDom(containerId) {
  const rows = document.querySelectorAll('#' + containerId + ' .contact-row');
  const out = [];
  rows.forEach(r => {
    const rid = r.getAttribute('data-id');
    const name = document.getElementById(rid + '_name').value.trim();
    const role = document.getElementById(rid + '_role').value.trim();
    const phone = document.getElementById(rid + '_phone').value.trim();
    if (name || phone) out.push({ name, role, phone });
  });
  return out;
}
function addProblemRow(prefix) {
  problemCounters[prefix] = (problemCounters[prefix] || 0) + 1;
  const rid = prefix + '_p' + problemCounters[prefix];
  const div = document.createElement('div');
  div.className = 'problem-row';
  div.setAttribute('data-id', rid);
  div.style.cssText = 'display:grid; grid-template-columns:1fr 1fr 90px 28px; gap:6px; margin-bottom:6px;';
  div.innerHTML = `
    <input type="text" placeholder="المشكلة" id="${rid}_issue">
    <input type="text" placeholder="التفاصيل الفنية" id="${rid}_detail">
    <select id="${rid}_priority"><option value="">الأولوية</option><option>عالية</option><option>متوسطة</option><option>منخفضة</option></select>
    <button onclick="this.parentElement.remove()" style="border:none;background:transparent;color:#C0392B;cursor:pointer;">✕</button>
  `;
  document.getElementById(prefix + '_problems').appendChild(div);
}

function collectModulesFrom(prefix) {
  const boxes = document.querySelectorAll('#' + prefix + '_modules input[type=checkbox]:checked');
  return Array.from(boxes).map(b => b.value);
}

function v(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }

async function submitNewClient() {
  const errEl = document.getElementById('new-error');
  const btn = document.getElementById('new-client-save-btn');
  errEl.style.display = 'none';
  const name = v('new_name');
  if (!name) { errEl.textContent = 'اكتب اسم العميل.'; errEl.style.display = 'block'; return; }
  btn.disabled = true;
  btn.innerHTML = 'جارِ الحفظ<span class="spinner"></span>';
  const d = {
    name, phone: v('new_phone'), country: v('new_country'),
    activity: v('new_activity'), branches: v('new_branches'), users_count: v('new_users'),
    warehouse: v('new_warehouse'), warehouse_count: v('new_warehouseCount'), contact: v('new_contact'), visit_date: v('new_date'),
    lead_source: v('new_leadSource'),
    has_system: v('new_hasSystem'), sys_name: v('new_sysName'), sys_age: v('new_sysAge'), sys_type: v('new_sysType'),
    problems: collectProblemsFromDom('new_problems'), needs: v('new_needs'),
    modules: collectModulesFrom('new'),
    deal_value: v('new_dealValue'), currency: v('new_currency') || 'EGP', expected_close_date: v('new_expectedClose'),
    attendees: v('new_attendees'), decision: v('new_decision'), finance: v('new_finance'), ops: v('new_ops'),
    demo_date: v('new_demoDate'), demo_time: v('new_demoTime'), demo_place: v('new_demoPlace'),
    next_follow_up_date: v('new_nextFollowUp'),
    contacts: collectContactsFromDom('new_contacts'),
    sales_id: currentProfile.id, stage: 'discovery', review_status: 'بانتظار المراجعة',
  };
  const { error } = await sb.from('clients').insert(d);
  if (error) {
    errEl.textContent = 'خطأ: ' + error.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'حفظ العميل';
    return;
  }
  showToast('تم حفظ العميل بنجاح', 'success');
  closeModal();
  await loadClients();
}

// ---------- Client detail modal ----------
async function openClientModal(c) {
  const root = document.getElementById('modal-root');
  const { data: debriefs } = await sb.from('debriefs').select('*').eq('client_id', c.id).order('created_at', { ascending: false });
  const { data: activities } = await sb.from('activities').select('*').eq('client_id', c.id).order('activity_date', { ascending: false });
  const files = await listClientFiles(c.id);
  root.innerHTML = `
  <div class="modal-overlay" style="position:fixed;">
    <div class="modal-box">
      <div class="modal-head"><div class="card-title" style="margin:0;">${escapeHtml(c.name)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      ${c.phone ? `<div class="hint" style="margin-bottom:10px;">${escapeHtml(c.phone)} ${whatsappLink(c.phone) ? `— <a href="${whatsappLink(c.phone)}" target="_blank" rel="noopener">فتح واتساب</a>` : ''}</div>` : ''}
      <div class="field" style="margin-bottom:10px;">
        <label>المرحلة الحالية</label>
        <select id="stage-select">${STAGES.map(s => `<option value="${s.key}" ${s.key === c.stage ? 'selected' : ''}>${s.label}</option>`).join('')}</select>
      </div>
      <div class="grid2" style="margin-bottom:10px;">
        <div class="field"><label>تاريخ المتابعة القادمة</label><input id="next-follow-up" type="date" value="${c.next_follow_up_date || ''}"></div>
        <div class="field"><label>سبب الخسارة (لو المرحلة خسارة)</label>
          <select id="loss-reason">
            <option value="">غير محدد</option>
            ${LOSS_REASONS.map(r => `<option ${c.loss_reason === r ? 'selected' : ''}>${r}</option>`).join('')}
          </select>
        </div>
      </div>
      <button class="btn-secondary" onclick="updateStage('${c.id}')">تحديث المرحلة</button>
      <div class="grid2" style="margin-top:14px;">
        <div class="field"><label>قيمة الصفقة</label><input id="deal-value" type="number" min="0" value="${c.deal_value || ''}"></div>
        <div class="field"><label>العملة</label>
          <select id="deal-currency">
            <option value="EGP" ${c.currency === 'EGP' ? 'selected' : ''}>جنيه مصري</option>
            <option value="KWD" ${c.currency === 'KWD' ? 'selected' : ''}>دينار كويتي</option>
            <option value="OMR" ${c.currency === 'OMR' ? 'selected' : ''}>ريال عُماني</option>
          </select>
        </div>
        <div class="field"><label>تاريخ الإغلاق المتوقع</label><input id="deal-close" type="date" value="${c.expected_close_date || ''}"></div>
        <div class="field"><label>القيمة المرجّحة (حسب المرحلة)</label><input value="${formatMoney(weightedValue(c), c.currency)}" disabled></div>
        <div class="field"><label>مصدر العميل</label>
          <select id="deal-leadsource">
            <option value="">غير محدد</option>
            ${LEAD_SOURCES.map(s => `<option ${c.lead_source === s ? 'selected' : ''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <button class="btn-secondary" style="margin-top:8px;" onclick="updateFinancials('${c.id}')">حفظ البيانات المالية</button>

      <div class="card-title" style="margin-top:16px;">العقد والتجديد</div>
      <div class="grid2">
        <div class="field"><label>تاريخ بداية العقد</label><input id="contract-start" type="date" value="${c.contract_start_date || ''}"></div>
        <div class="field"><label>تاريخ التجديد القادم</label><input id="renewal-date" type="date" value="${c.renewal_date || ''}"></div>
        <div class="field"><label>قيمة التجديد السنوي</label><input id="renewal-value" type="number" min="0" value="${c.renewal_value || ''}"></div>
      </div>
      <button class="btn-secondary" style="margin-top:8px;" onclick="updateRenewal('${c.id}')">حفظ بيانات العقد</button>

      ${c.stage === 'won' ? `
      <div class="card-title" style="margin-top:16px;">مرحلة التنفيذ</div>
      <div class="field">
        <select id="impl-stage">
          <option value="">لم تبدأ بعد</option>
          ${IMPLEMENTATION_STAGES.map(s => `<option value="${s}" ${c.implementation_stage === s ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
      </div>
      <button class="btn-secondary" style="margin-top:8px;" onclick="updateImplementationStage('${c.id}')">تحديث مرحلة التنفيذ</button>
      ` : `<div class="hint" style="margin-top:12px;">مرحلة التنفيذ بتظهر بعد ما الصفقة توصل لمرحلة "فوز".</div>`}

      <div class="summary-box" style="margin-top:14px;">${buildClientSummary(c)}</div>

      <div class="card-title" style="margin-top:16px;">جهات اتصال إضافية</div>
      <div id="contacts-view">${(c.contacts || []).map(ct => `
        <div class="hint" style="margin-bottom:6px; padding:8px; background:var(--blue-50); border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
          <span>${escapeHtml(ct.name)} ${ct.role ? ('— ' + escapeHtml(ct.role)) : ''} ${ct.phone ? ('— ' + escapeHtml(ct.phone)) : ''}</span>
          ${whatsappLink(ct.phone) ? `<a href="${whatsappLink(ct.phone)}" target="_blank" rel="noopener">واتساب</a>` : ''}
        </div>`).join('') || '<div class="hint">لا يوجد جهات اتصال إضافية</div>'}
      </div>
      <div id="new-contacts-${c.id}"></div>
      <button class="btn-secondary" onclick="addContactRow('new-contacts-${c.id}')">+ إضافة جهة اتصال</button>
      <button class="btn-secondary" style="margin-top:8px;" onclick="saveContacts('${c.id}')">حفظ جهات الاتصال</button>

      <div class="card-title" style="margin-top:16px;">المرفقات</div>
      <div id="files-list">${files.length === 0 ? '<div class="hint">لا يوجد مرفقات بعد</div>' : ''}</div>
      <div style="display:flex; gap:8px; align-items:center; margin-top:6px;">
        <input type="file" id="file-input-${c.id}" style="flex:1;">
        <button class="btn-secondary" onclick="uploadFile('${c.id}')">رفع</button>
      </div>

      <div class="card-title" style="margin-top:16px;">Debrief</div>
      <div id="debrief-list">${(debriefs || []).map(db => `
        <div class="hint" style="margin-bottom:8px; padding:8px; background:var(--blue-50); border-radius:8px;">
          ${new Date(db.created_at).toLocaleDateString('ar-EG')}<br>
          إيجابيات: ${escapeHtml(db.went_well || '-')}<br>اعتراضات: ${escapeHtml(db.objections || '-')}<br>الخطوة التالية: ${escapeHtml(db.next_step || '-')}
        </div>`).join('') || '<div class="hint">لا يوجد Debrief بعد</div>'}
      </div>
      <div class="field"><label>إيجابيات الديمو</label><input id="db_well" type="text"></div>
      <div class="field"><label>اعتراضات</label><input id="db_obj" type="text"></div>
      <div class="field"><label>الخطوة التالية</label><input id="db_next" type="text"></div>
      <button class="btn-secondary" style="margin-top:8px;" onclick="addDebrief('${c.id}')">إضافة Debrief</button>

      <div class="card-title" style="margin-top:16px;">سجل النشاط (زيارات ومكالمات)</div>
      <div id="activity-list">${(activities || []).map(a => `
        <div class="hint" style="margin-bottom:6px; padding:8px; background:var(--blue-50); border-radius:8px;">
          ${a.activity_date} — ${escapeHtml(a.activity_type)}${a.notes ? (' — ' + escapeHtml(a.notes)) : ''}
        </div>`).join('') || '<div class="hint">لا يوجد نشاط مسجّل بعد</div>'}
      </div>
      <div class="grid2" style="margin-top:8px;">
        <div class="field"><label>نوع النشاط</label>
          <select id="act-type"><option>زيارة</option><option>مكالمة</option><option>متابعة</option></select>
        </div>
        <div class="field"><label>التاريخ</label><input id="act-date" type="date"></div>
      </div>
      <input id="act-notes" type="text" placeholder="ملاحظة سريعة (اختياري)" style="margin-top:8px;">
      <button class="btn-secondary" style="margin-top:8px;" onclick="logActivity('${c.id}')">تسجيل النشاط</button>

      <div style="margin-top:10px;"><a href="report.html?client=${c.id}" class="btn-secondary" style="text-decoration:none; display:inline-block;">عرض تقرير Go-Live</a></div>
    </div>
  </div>`;
  renderFilesList(c.id, files);
}

async function renderFilesList(clientId, files) {
  const listEl = document.getElementById('files-list');
  if (!listEl || files.length === 0) return;
  const canDelete = currentProfile.role === 'admin' || currentProfile.role === 'support';
  const rows = await Promise.all(files.map(async (f) => {
    const url = await getClientFileUrl(clientId, f.name);
    return `
      <div class="hint" style="margin-bottom:6px; padding:8px; background:var(--blue-50); border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
        <a href="${url || '#'}" target="_blank" rel="noopener">${escapeHtml(f.name.replace(/^\d+_/, ''))}</a>
        ${canDelete ? `<button data-del-file="${escapeHtml(f.name)}" style="border:none;background:transparent;color:#C0392B;cursor:pointer;">حذف</button>` : ''}
      </div>`;
  }));
  listEl.innerHTML = rows.join('');
  listEl.querySelectorAll('[data-del-file]').forEach(btn => {
    btn.addEventListener('click', async () => {
      await deleteClientFile(clientId, btn.getAttribute('data-del-file'));
      const c = allClients.find(x => x.id === clientId);
      openClientModal(c);
    });
  });
}

async function uploadFile(clientId) {
  const input = document.getElementById('file-input-' + clientId);
  if (!input.files || input.files.length === 0) { showToast('اختار ملف الأول', 'error'); return; }
  try {
    await uploadClientFile(clientId, input.files[0]);
    showToast('تم رفع الملف', 'success');
    const c = allClients.find(x => x.id === clientId);
    openClientModal(c);
  } catch (e) {
    showToast('تعذر رفع الملف: ' + e.message, 'error');
  }
}

async function saveContacts(clientId) {
  const c = allClients.find(x => x.id === clientId);
  const existing = c.contacts || [];
  const added = collectContactsFromDom('new-contacts-' + clientId);
  const contacts = existing.concat(added);
  await sb.from('clients').update({ contacts }).eq('id', clientId);
  showToast('تم حفظ جهات الاتصال', 'success');
  await loadClients();
  const updated = allClients.find(x => x.id === clientId);
  openClientModal(updated);
}

async function updateStage(clientId) {
  const stage = document.getElementById('stage-select').value;
  const next_follow_up_date = document.getElementById('next-follow-up').value;
  const loss_reason = document.getElementById('loss-reason').value || null;
  await sb.from('clients').update({ stage, next_follow_up_date, loss_reason }).eq('id', clientId);
  showToast('تم تحديث المرحلة', 'success');
  closeModal();
  await loadClients();
}

async function updateFinancials(clientId) {
  const d = {
    deal_value: document.getElementById('deal-value').value || 0,
    currency: document.getElementById('deal-currency').value,
    expected_close_date: document.getElementById('deal-close').value,
    lead_source: document.getElementById('deal-leadsource').value || null,
  };
  await sb.from('clients').update(d).eq('id', clientId);
  showToast('تم حفظ البيانات المالية', 'success');
  closeModal();
  await loadClients();
}

async function updateRenewal(clientId) {
  const d = {
    contract_start_date: document.getElementById('contract-start').value,
    renewal_date: document.getElementById('renewal-date').value,
    renewal_value: document.getElementById('renewal-value').value || 0,
  };
  await sb.from('clients').update(d).eq('id', clientId);
  showToast('تم حفظ بيانات العقد', 'success');
  closeModal();
  await loadClients();
}

async function updateImplementationStage(clientId) {
  const stage = document.getElementById('impl-stage').value || null;
  await sb.from('clients').update({ implementation_stage: stage }).eq('id', clientId);
  showToast('تم تحديث مرحلة التنفيذ', 'success');
  closeModal();
  await loadClients();
}

async function addDebrief(clientId) {
  const d = { client_id: clientId, created_by: currentProfile.id, went_well: v('db_well'), objections: v('db_obj'), next_step: v('db_next') };
  await sb.from('debriefs').insert(d);
  showToast('تمت إضافة الـ Debrief', 'success');
  const c = allClients.find(x => x.id === clientId);
  openClientModal(c);
}

async function logActivity(clientId) {
  const d = {
    client_id: clientId,
    sales_id: currentProfile.id,
    activity_type: document.getElementById('act-type').value,
    activity_date: document.getElementById('act-date').value || new Date().toISOString().slice(0, 10),
    notes: document.getElementById('act-notes').value.trim(),
  };
  await sb.from('activities').insert(d);
  showToast('تم تسجيل النشاط', 'success');
  const c = allClients.find(x => x.id === clientId);
  openClientModal(c);
}

function closeModal() { document.getElementById('modal-root').innerHTML = ''; }
</script>
</body>
</html>

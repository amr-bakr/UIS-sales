function safeStorageGet(key) {
  try { return localStorage.getItem(key); } catch (e) { return null; }
}
function safeStorageSet(key, value) {
  try { localStorage.setItem(key, value); } catch (e) { /* تجاهل بهدوء */ }
}

(function applySavedTheme() {
  const saved = safeStorageGet('uis-theme');
  if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
})();

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (isDark) {
    document.documentElement.removeAttribute('data-theme');
    safeStorageSet('uis-theme', 'light');
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    safeStorageSet('uis-theme', 'dark');
  }

function loadScriptTag(src) {
  return new Promise((resolve, reject) => {
    const el = document.createElement('script');
    el.src = src;
    el.onload = () => resolve();
    el.onerror = () => reject(new Error('failed to load ' + src));
    document.head.appendChild(el);
  });
}

let _libLoadPromise = null;
function loadSupabaseLib() {
  if (typeof supabase !== 'undefined') return Promise.resolve();
  if (_libLoadPromise) return _libLoadPromise;
  _libLoadPromise = SUPABASE_LIB_SOURCES.reduce(
    (chain, src) => chain.catch(() => loadScriptTag(src)),
    Promise.reject()
  );
  return _libLoadPromise;
}

// ---------- تحميل مكتبة Chart.js ديناميكيًا (مستخدمة في لوحة الإدارة بس) ----------

  ];
  _chartLibPromise = sources.reduce(
    (chain, src) => chain.catch(() => loadScriptTag(src)),
    Promise.reject()
  );
  return _chartLibPromise;
}

}

}

// ---------- الأمان: تنظيف أي نص المستخدم كتبه قبل حقنه في الصفحة ----------
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ---------- Phase 3: الماليات والتوقعات ----------
// احتمالية الإغلاق التلقائية حسب المرحلة — تقدر تعدّل النسب دي براحتك
const STAGE_PROBABILITY = {
  discovery: 0.10, demo_scheduled: 0.25, demo_done: 0.40,
  proposal: 0.60, negotiation: 0.75, won: 1, lost: 0,
};

// سعر الصرف التقريبي لكل عملة مقابل الدولار — عدّل الأرقام دي لما الأسعار تتغيّر
const CURRENCY_TO_USD = { EGP: 1 / 49, KWD: 3.25, OMR: 2.6 };

function weightedValue(client) {
  const val = Number(client.deal_value) || 0;
  const prob = STAGE_PROBABILITY[client.stage] ?? 0;
  return val * prob;
}

function toUSD(amount, currency) {
  const rate = CURRENCY_TO_USD[currency] || 1;
  return (Number(amount) || 0) * rate;
}

function formatMoney(amount, currency) {
  const n = Number(amount) || 0;
  return Math.round(n).toLocaleString('ar-EG') + (currency ? (' ' + currency) : '');
}

function monthKey(dateStr) {
  if (!dateStr) return null;
  return dateStr.slice(0, 7); // "2026-07-15" → "2026-07"
}

// ---------- تجربة الاستخدام: تنبيهات Toast بدل alert() ----------
function showToast(message, type = 'info') {
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('toast-show'));
  setTimeout(() => {
    toast.classList.remove('toast-show');
    setTimeout(() => toast.remove(), 250);
  }, 3200);
}

function whatsappLink(phone) {
  if (!phone) return null;
  const digits = phone.replace(/[^\d]/g, '');

  return 'https://wa.me/' + digits;
}

// ---------- مرفقات العميل (Supabase Storage) ----------
async function uploadClientFile(clientId, file) {
  const path = clientId + '/' + Date.now() + '_' + file.name.replace(/[^\w.\-]/g, '_');
  const { error } = await sb.storage.from('client-files').upload(path, file);
  if (error) throw error;
  return path;
}

async function listClientFiles(clientId) {
  const { data, error } = await sb.storage.from('client-files').list(clientId, { sortBy: { column: 'created_at', order: 'desc' } });
  if (error) return [];
  return data || [];
}

async function getClientFileUrl(clientId, filename) {
  const { data, error } = await sb.storage.from('client-files').createSignedUrl(clientId + '/' + filename, 3600);
  if (error) return null;
  return data.signedUrl;
}

async function deleteClientFile(clientId, filename) {
  await sb.storage.from('client-files').remove([clientId + '/' + filename]);
}

function reviewBadgeClass(status) {
  if (status === 'تم الاستلام') return 'badge-received';
  if (status === 'يحتاج استكمال') return 'badge-needs';
  return 'badge-pending';
}

// ---------- Auth helpers ----------
async function getCurrentProfile() {
  try {
    await ensureSb();
  } catch (e) {
    return null;
  }
  try {
    const { data: sessionData } = await sb.auth.getSession();
    if (!sessionData || !sessionData.session) return null;
    const userId = sessionData.session.user.id;
    const { data, error } = await sb.from('profiles').select('*').eq('id', userId).single();
    if (error) return null;
    return data;
  } catch (e) {
    console.error('getCurrentProfile failed:', e);
    return null;
  }
}

async function requireRole(allowedRoles) {
  const profile = await getCurrentProfile();
  if (!profile) {
    window.location.href = 'login.html';
    return null;
  }
  if (!allowedRoles.includes(profile.role)) {
    window.location.href = 'login.html';
    return null;
  }
  return profile;
}

async function logout() {
  try { await ensureSb(); if (sb) await sb.auth.signOut(); } catch (e) {}
  window.location.href = 'login.html';
}

// ---------- Summary builder (used everywhere a client record is displayed) ----------
function buildClientSummary(d) {
  const e = escapeHtml;
  let lines = [];
  lines.push('العميل: ' + e(d.name || '-') + ' | رقم التواصل: ' + e(d.phone || '-'));
  lines.push('النشاط: ' + e(d.activity || '-') + ' | عدد الفروع: ' + e(d.branches || '-') + ' | المستخدمين: ' + e(d.users_count || '-'));
  lines.push('مطبخ / مصنع مركزي: ' + e(d.warehouse || '-') + ' | عدد المخازن: ' + e(d.warehouse_count || '-'));
  lines.push('المسؤول: ' + e(d.contact || '-') + ' | الدولة: ' + e(d.country || '-'));
  lines.push('');
  lines.push('النظام الحالي: ' + e(d.has_system || '-') + (d.sys_name ? (' — ' + e(d.sys_name)) : '') + (d.sys_age ? (' — منذ ' + e(d.sys_age)) : '') + (d.sys_type ? (' — ' + e(d.sys_type)) : ''));
  lines.push('');
  const problems = d.problems || [];
  lines.push('المشاكل:');
  if (problems.length === 0) lines.push('  (لا يوجد)');
  problems.forEach((p, i) => lines.push('  ' + (i + 1) + '. ' + e(p.issue) + (p.detail ? (' — ' + e(p.detail)) : '') + (p.priority ? (' [' + e(p.priority) + ']') : '')));
  lines.push('');
  lines.push('الاحتياجات والتقارير: ' + e(d.needs || '-'));
  lines.push('');
  const modules = d.modules || [];
  lines.push('الموديولات المطلوبة: ' + (modules.length ? e(modules.join('، ')) : '-'));
  lines.push('');
  lines.push('حضور الديمو: ' + e(d.attendees || '-') + ' | صاحب القرار: ' + e(d.decision || '-'));
  lines.push('الإدارة المالية: ' + e(d.finance || '-') + ' | التشغيل: ' + e(d.ops || '-'));
  lines.push('');
  lines.push('الديمو المقترح: ' + e(d.demo_date || '-') + ' ' + e(d.demo_time || '') + ' — ' + e(d.demo_place || '-'));
  return lines.join('\n');
}

function collectProblemsFromDom(containerId) {
  const rows = document.querySelectorAll('#' + containerId + ' .problem-row');
  const out = [];
  rows.forEach(r => {
    const idPrefix = r.getAttribute('data-id');
    const issue = document.getElementById(idPrefix + '_issue').value.trim();
    const detail = document.getElementById(idPrefix + '_detail').value.trim();
    const priority = document.getElementById(idPrefix + '_priority').value;
    if (issue || detail) out.push({ issue, detail, priority });
  });
  return out;
}

  if (clientErr || !c) {
    document.getElementById('form-area').innerHTML = '<div class="error-box">العميل ده مش موجود أو اتحذف.</div>';
    document.querySelectorAll('.topbar .btn-primary, .topbar .nav-links .btn-secondary:not(:first-child)').forEach(b => b.style.display = 'none');
    return;
  }
  client = c;
  document.getElementById('client-name').textContent = client.name;

  const { data: r } = await sb.from('implementation_reports').select('*').eq('client_id', clientId).order('created_at', { ascending: false }).limit(1);
  report = (r && r[0]) || null;
  renderForm();
})();

function renderForm() {
  const d = report || {};
  document.getElementById('form-area').innerHTML = `
    <div class="card">
      <div class="card-title">نظرة عامة على المشروع</div>
      <div class="grid2">
        <div class="field"><label>اسم العميل</label><input value="${escapeHtml(client.name || '')}" disabled></div>
        <div class="field"><label>الدولة</label><input value="${escapeHtml(client.country || '')}" disabled></div>
        <div class="field"><label>اسم مهندس الميدان</label><input id="r_engineer" value="${escapeHtml(d.engineer_name || '')}"></div>
        <div class="field"><label>تاريخ التفعيل</label><input id="r_activation" type="date" value="${escapeHtml(d.activation_date || '')}"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">ملاحظات الهاردوير والتركيب</div>
      <textarea id="r_hardware" rows="3">${escapeHtml(d.hardware_notes || '')}</textarea>
    </div>

    <div class="card">
      <div class="card-title">Checklist التركيب</div>
      <div id="checklist"></div>
      <button class="btn-secondary" onclick="addChecklistItem()">+ إضافة بند</button>
    </div>

    <div class="card">
      <div class="card-title">ملخص التدريب</div>
      <textarea id="r_training" rows="3">${escapeHtml(d.training_summary || '')}</textarea>
    </div>

    <div class="card">
      <div class="card-title">المشاكل والإجراءات</div>
      <div id="issues"></div>
      <button class="btn-secondary" onclick="addIssueItem()">+ إضافة مشكلة</button>
    </div>

    <div class="card">
      <div class="card-title">حالة الـ Go-Live والتوصية</div>
      <div class="field" style="margin-bottom:10px;">
        <label>الحالة</label>
        <select id="r_status">
          <option value="قيد المراجعة" ${d.go_live_status === 'قيد المراجعة' ? 'selected' : ''}>قيد المراجعة</option>
          <option value="جاهز" ${d.go_live_status === 'جاهز' ? 'selected' : ''}>جاهز</option>
          <option value="غير جاهز" ${d.go_live_status === 'غير جاهز' ? 'selected' : ''}>غير جاهز</option>
        </select>
      </div>
      <textarea id="r_recommendation" rows="2" placeholder="توصية مهندس الميدان">${escapeHtml(d.field_engineer_recommendation || '')}</textarea>
    </div>

    <div class="card">
      <div class="card-title">التوقيع</div>
      <div class="grid2">
        <div class="field"><label>اسم مهندس الميدان (توقيع)</label><input id="r_sign_eng" value="${escapeHtml(d.signed_by_engineer || '')}"></div>
        <div class="field"><label>اسم ممثل العميل (توقيع)</label><input id="r_sign_client" value="${escapeHtml(d.signed_by_client || '')}"></div>
        <div class="field"><label>تاريخ التوقيع</label><input id="r_sign_date" type="date" value="${escapeHtml(d.sign_off_date || '')}"></div>
      </div>
    </div>
  `;
  renderListRows('checklist', d.installation_checklist || [], ['بند'], 'item-row', true);
  renderListRows('issues', d.issues || [], ['المشكلة', 'الإجراء'], 'issue-row', false);
}

function renderListRows(containerId, items, labels, rowClass, hasDone) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  items.forEach(it => addRow(containerId, rowClass, hasDone, it));
}

function addRow(containerId, rowClass, hasDone, existing) {
  const el = document.getElementById(containerId);
  const rid = containerId + '_' + Date.now() + Math.random().toString(36).slice(2, 6);
  const div = document.createElement('div');
  div.className = rowClass;
  div.setAttribute('data-id', rid);
  if (rowClass === 'item-row') {
    div.innerHTML = `
      <input type="text" placeholder="بند التركيب" id="${rid}_text" value="${escapeHtml((existing && existing.item) || '')}">
      <select id="${rid}_done"><option value="لا" ${existing && existing.done === false ? 'selected' : ''}>لسه</option><option value="تم" ${existing && existing.done === true ? 'selected' : ''}>تم</option></select>
      <button onclick="this.parentElement.remove()">✕</button>
    `;
  } else {
    div.innerHTML = `
      <input type="text" placeholder="المشكلة" id="${rid}_issue" value="${escapeHtml((existing && existing.issue) || '')}">
      <input type="text" placeholder="الإجراء المتخذ" id="${rid}_action" value="${escapeHtml((existing && existing.action) || '')}">
      <input type="text" placeholder="المسؤول" id="${rid}_owner" value="${escapeHtml((existing && existing.owner) || '')}">
      <button onclick="this.parentElement.remove()">✕</button>
    `;
  }
  el.appendChild(div);
}

function addChecklistItem() { addRow('checklist', 'item-row', true, null); }
function addIssueItem() { addRow('issues', 'issue-row', false, null); }

function collectChecklist() {
  return Array.from(document.querySelectorAll('#checklist .item-row')).map(r => {
    const rid = r.getAttribute('data-id');
    return { item: document.getElementById(rid + '_text').value.trim(), done: document.getElementById(rid + '_done').value === 'تم' };
  }).filter(x => x.item);
}
function collectIssues() {
  return Array.from(document.querySelectorAll('#issues .issue-row')).map(r => {
    const rid = r.getAttribute('data-id');
    return {
      issue: document.getElementById(rid + '_issue').value.trim(),
      action: document.getElementById(rid + '_action').value.trim(),
      owner: document.getElementById(rid + '_owner').value.trim(),
    };
  }).filter(x => x.issue || x.action);
}

async function saveReport() {
  const btn = document.getElementById('save-report-btn');
  btn.disabled = true;
  btn.innerHTML = 'جارِ الحفظ<span class="spinner"></span>';
  const d = {
    client_id: clientId,
    engineer_name: document.getElementById('r_engineer').value.trim(),
    activation_date: document.getElementById('r_activation').value,
    hardware_notes: document.getElementById('r_hardware').value.trim(),
    installation_checklist: collectChecklist(),
    training_summary: document.getElementById('r_training').value.trim(),
    issues: collectIssues(),
    go_live_status: document.getElementById('r_status').value,
    field_engineer_recommendation: document.getElementById('r_recommendation').value.trim(),
    signed_by_engineer: document.getElementById('r_sign_eng').value.trim(),
    signed_by_client: document.getElementById('r_sign_client').value.trim(),
    sign_off_date: document.getElementById('r_sign_date').value,
    created_by: currentProfile.id,
  };
  try {
    if (report && report.id) {
      await sb.from('implementation_reports').update(d).eq('id', report.id);
    } else {
      const { data } = await sb.from('implementation_reports').insert(d).select().single();
      report = data;
    }
    showToast('تم الحفظ بنجاح', 'success');
  } catch (e) {
    showToast('حصل خطأ أثناء الحفظ', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'حفظ';
  }
}

function printReport() {
  const d = {
    engineer_name: document.getElementById('r_engineer').value,
    activation_date: document.getElementById('r_activation').value,
    hardware_notes: document.getElementById('r_hardware').value,
    checklist: collectChecklist(),
    training_summary: document.getElementById('r_training').value,
    issues: collectIssues(),
    status: document.getElementById('r_status').value,
    recommendation: document.getElementById('r_recommendation').value,
    sign_eng: document.getElementById('r_sign_eng').value,
    sign_client: document.getElementById('r_sign_client').value,
    sign_date: document.getElementById('r_sign_date').value,
  };
  document.getElementById('print-view').innerHTML = `
    <div style="font-family:'Almarai','Tajawal',sans-serif; direction:rtl;">
      <h2 style="color:#0B2C52;">تقرير التنفيذ والـ Go-Live — ${escapeHtml(client.name || '')}</h2>
      <p><b>الدولة:</b> ${escapeHtml(client.country || '-')} | <b>مهندس الميدان:</b> ${escapeHtml(d.engineer_name || '-')} | <b>تاريخ التفعيل:</b> ${escapeHtml(d.activation_date || '-')}</p>
      <h3>ملاحظات الهاردوير والتركيب</h3><p>${escapeHtml(d.hardware_notes || '-')}</p>
      <h3>Checklist التركيب</h3>
      <ul>${d.checklist.map(c => `<li>${escapeHtml(c.item)} — ${c.done ? 'تم' : 'لسه'}</li>`).join('') || '<li>-</li>'}</ul>
      <h3>ملخص التدريب</h3><p>${escapeHtml(d.training_summary || '-')}</p>
      <h3>المشاكل والإجراءات</h3>
      <ul>${d.issues.map(i => `<li>${escapeHtml(i.issue)} — ${escapeHtml(i.action)} (${escapeHtml(i.owner || '-')})</li>`).join('') || '<li>-</li>'}</ul>
      <h3>حالة الـ Go-Live: ${escapeHtml(d.status)}</h3>
      <p><b>توصية مهندس الميدان:</b> ${escapeHtml(d.recommendation || '-')}</p>
      <h3>التوقيع</h3>
      <p>مهندس الميدان: ${escapeHtml(d.sign_eng || '____________')} &nbsp;&nbsp; ممثل العميل: ${escapeHtml(d.sign_client || '____________')} &nbsp;&nbsp; التاريخ: ${escapeHtml(d.sign_date || '-')}</p>
    </div>
  `;
  window.print();
}
</script>
</body>
</html>
